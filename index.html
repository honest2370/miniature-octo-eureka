<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <title>ADF — Arafat Digital Futurist</title>
    <meta name="description" content="ADF — Arafat Digital Futurist. Services créatifs sur mesure, boutique digitale et assistant IA ADF IA." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#06b6d4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ADF" />
    <link rel="apple-touch-icon" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" href="/icons/icon-512.png" />

    <style>
      html, body, #root { height: 100%; }
      body { margin: 0; background: #050816; }
      #boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(120% 120% at 50% 0%, #0b1226 0%, #050816 60%, #02030b 100%);
        z-index: 9999; transition: opacity .4s ease;
      }
      #boot .ring {
        width: 54px; height: 54px; border-radius: 50%;
        border: 3px solid rgba(34,211,238,.18); border-top-color: #22d3ee;
        animation: adfspin .8s linear infinite;
        box-shadow: 0 0 24px rgba(34,211,238,.45);
      }
      @keyframes adfspin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="boot"><div class="ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
